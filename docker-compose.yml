services:
  postgres:
    image: pgvector/pgvector:pg17        # PostgreSQL 17 + pgvector 내장
    container_name: tax_pgvector
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB:       ${POSTGRES_DB:-tax_db}
    ports:
      - "5433:5432"  # 호스트 5433 → 컨테이너 내부 5432
    volumes:
      - pgvector_data:/var/lib/postgresql/data   # 데이터 영속성
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql  # 자동 초기화
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-tax_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgvector_data:

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>세무 자동화 어시스턴트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg:        #0f1117;
    --surface:   #181c27;
    --surface2:  #1e2433;
    --border:    rgba(255,255,255,0.07);
    --accent:    #4f7cff;
    --accent2:   #7c9fff;
    --text:      #e8eaf0;
    --text-muted:#7a8099;
    --danger:    #ff5c5c;
    --success:   #4caf7d;
    --radius:    12px;
    --font-body: 'Noto Sans KR', sans-serif;
    --font-serif:'Noto Serif KR', serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    overflow: hidden;
  }

  /* ── 인증 화면 ─────────────────────────────────── */
  #auth-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    animation: fadeIn .4s ease;
  }
  #auth-screen.hidden { display: none; }

  .auth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 44px;
    width: 400px;
    display: flex; flex-direction: column; gap: 28px;
  }
  .auth-logo {
    font-family: var(--font-serif);
    font-size: 22px;
    color: var(--text);
    letter-spacing: -0.5px;
  }
  .auth-logo span { color: var(--accent2); }

  .auth-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    gap: 0;
  }
  .auth-tab {
    flex: 1; padding: 10px;
    background: none; border: none;
    color: var(--text-muted);
    font-family: var(--font-body);
    font-size: 14px; cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all .2s;
  }
  .auth-tab.active {
    color: var(--accent2);
    border-bottom-color: var(--accent2);
  }

  .auth-form { display: flex; flex-direction: column; gap: 14px; }
  .field-label {
    font-size: 12px; color: var(--text-muted);
    letter-spacing: .5px; text-transform: uppercase;
    margin-bottom: 4px;
  }
  .auth-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
  }
  .auth-input:focus { border-color: var(--accent); }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-family: var(--font-body);
    font-size: 14px; font-weight: 500;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
  }
  .btn-primary:hover { opacity: .88; }
  .btn-primary:active { transform: scale(.98); }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; }

  .auth-msg {
    font-size: 13px; text-align: center; min-height: 18px;
  }
  .auth-msg.error   { color: var(--danger); }
  .auth-msg.success { color: var(--success); }

  /* ── 메인 레이아웃 ─────────────────────────────── */
  #app { display: flex; width: 100%; height: 100dvh; }

  /* ── 사이드바 ───────────────────────────────────── */
  .sidebar {
    width: 280px; flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    padding: 24px 0;
    gap: 0;
  }
  .sidebar-logo {
    font-family: var(--font-serif);
    font-size: 18px;
    padding: 0 24px 24px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-logo span { color: var(--accent2); }

  .sidebar-section {
    padding: 20px 24px 0;
    display: flex; flex-direction: column; gap: 10px;
  }
  .sidebar-label {
    font-size: 11px; color: var(--text-muted);
    letter-spacing: 1px; text-transform: uppercase;
    margin-bottom: 4px;
  }

  /* 드롭존 */
  .dropzone {
    border: 1.5px dashed var(--border);
    border-radius: var(--radius);
    padding: 22px 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    position: relative;
  }
  .dropzone:hover, .dropzone.dragover {
    border-color: var(--accent);
    background: rgba(79,124,255,.05);
  }
  .dropzone input { position: absolute; inset:0; opacity:0; cursor:pointer; }
  .dropzone-icon {
    font-size: 28px; margin-bottom: 8px;
    filter: grayscale(1); opacity: .5;
  }
  .dropzone-text {
    font-size: 12px; color: var(--text-muted); line-height: 1.5;
  }

  .upload-status {
    font-size: 12px; color: var(--text-muted); min-height: 16px;
    text-align: center;
  }
  .upload-status.ok  { color: var(--success); }
  .upload-status.err { color: var(--danger); }

  /* 업로드된 파일 목록 */
  .file-list {
    display: flex; flex-direction: column; gap: 6px;
    flex: 1; overflow-y: auto; padding: 0 24px 20px;
    margin-top: 12px;
  }
  .file-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 12px; color: var(--text-muted);
    display: flex; align-items: center; gap: 8px;
    word-break: break-all;
  }
  .file-item .badge {
    font-size: 10px;
    background: rgba(79,124,255,.15);
    color: var(--accent2);
    padding: 2px 7px;
    border-radius: 99px; white-space: nowrap;
    flex-shrink: 0;
  }

  /* 사이드바 하단 사용자 */
  .sidebar-user {
    margin-top: auto;
    padding: 16px 24px 0;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .user-avatar {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: #fff; font-weight: 500;
    flex-shrink: 0;
  }
  .user-email { font-size: 12px; color: var(--text-muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .btn-logout {
    background: none; border: none;
    color: var(--text-muted);
    font-size: 11px; cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    transition: background .2s;
  }
  .btn-logout:hover { background: var(--surface2); color: var(--danger); }

  /* ── 채팅 영역 ──────────────────────────────────── */
  .chat-area {
    flex: 1; display: flex; flex-direction: column;
    background: var(--bg);
    min-width: 0;
  }

  .chat-header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  .chat-header h1 {
    font-family: var(--font-serif);
    font-size: 18px; font-weight: 400;
    letter-spacing: -0.3px;
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 0 3px rgba(76,175,125,.2);
  }

  .messages {
    flex: 1; overflow-y: auto;
    padding: 32px;
    display: flex; flex-direction: column; gap: 24px;
    scroll-behavior: smooth;
  }

  .msg {
    display: flex; gap: 14px;
    animation: slideUp .3s ease;
  }
  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
    margin-top: 2px;
  }
  .msg.assistant .msg-avatar {
    background: linear-gradient(135deg, var(--accent), #7c4fff);
    color: #fff;
  }
  .msg.user .msg-avatar {
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .msg-bubble {
    max-width: 68%; padding: 14px 18px;
    border-radius: 16px;
    font-size: 14px; line-height: 1.75;
  }
  .msg.assistant .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px 16px 16px 16px;
  }
  .msg.user .msg-bubble {
    background: var(--accent);
    color: #fff;
    border-radius: 16px 4px 16px 16px;
  }

  /* 마크다운 스타일 */
  .msg-bubble h2 {
    font-family: var(--font-serif);
    font-size: 15px; font-weight: 600;
    color: var(--accent2);
    margin: 16px 0 8px;
  }
  .msg-bubble h2:first-child { margin-top: 0; }
  .msg-bubble p   { margin-bottom: 10px; }
  .msg-bubble p:last-child { margin-bottom: 0; }
  .msg-bubble ul, .msg-bubble ol { padding-left: 20px; margin-bottom: 10px; }
  .msg-bubble li  { margin-bottom: 4px; }
  .msg-bubble code {
    background: rgba(79,124,255,.12);
    color: var(--accent2);
    padding: 1px 6px; border-radius: 4px;
    font-size: 13px;
  }
  .msg-bubble pre {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    overflow-x: auto;
    margin: 10px 0;
  }
  .msg-bubble pre code { background: none; padding: 0; }
  .msg-bubble strong { color: var(--accent2); }

  /* 타이핑 인디케이터 */
  .typing { display: flex; gap: 5px; padding: 6px 2px; align-items: center; }
  .typing span {
    width: 7px; height: 7px; background: var(--text-muted);
    border-radius: 50%; animation: blink 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }

  /* 빈 상태 */
  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; color: var(--text-muted);
    text-align: center; padding: 40px;
  }
  .empty-icon { font-size: 48px; opacity: .3; }
  .empty-title {
    font-family: var(--font-serif);
    font-size: 22px; color: var(--text);
    font-weight: 400;
  }
  .empty-sub { font-size: 14px; line-height: 1.6; max-width: 360px; }

  /* 입력창 */
  .chat-input-wrap {
    padding: 20px 32px 28px;
    border-top: 1px solid var(--border);
    display: flex; gap: 12px; align-items: flex-end;
  }
  .chat-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 18px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px; line-height: 1.5;
    resize: none; min-height: 52px; max-height: 200px;
    outline: none;
    transition: border-color .2s;
  }
  .chat-input:focus { border-color: var(--accent); }
  .chat-input::placeholder { color: var(--text-muted); }

  .btn-send {
    width: 52px; height: 52px;
    background: var(--accent);
    border: none; border-radius: 14px;
    color: #fff; font-size: 20px;
    cursor: pointer; flex-shrink: 0;
    transition: opacity .2s, transform .1s;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-send:hover   { opacity: .88; }
  .btn-send:active  { transform: scale(.95); }
  .btn-send:disabled { opacity: .35; cursor: not-allowed; }

  /* ── 애니메이션 ─────────────────────────────────── */
  @keyframes fadeIn   { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp  { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes blink    { 0%,80%,100% { opacity: .2; } 40% { opacity: 1; } }

  /* ── 스크롤바 ───────────────────────────────────── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
</style>
</head>
<body>

<!-- ══ 인증 화면 ══ -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">세무 <span>AI</span> 어시스턴트</div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">로그인</button>
      <button class="auth-tab"        onclick="switchTab('signup')">회원가입</button>
    </div>

    <div class="auth-form">
      <div>
        <div class="field-label">이메일</div>
        <input id="auth-email" class="auth-input" type="email" placeholder="example@company.com" autocomplete="email">
      </div>
      <div>
        <div class="field-label">비밀번호</div>
        <input id="auth-pw" class="auth-input" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <div id="auth-confirm-wrap" style="display:none;">
        <div class="field-label">비밀번호 확인</div>
        <input id="auth-pw2" class="auth-input" type="password" placeholder="••••••••">
      </div>
      <button class="btn-primary" id="auth-btn" onclick="handleAuth()">로그인</button>
      <div class="auth-msg" id="auth-msg"></div>
    </div>
  </div>
</div>

<!-- ══ 메인 앱 ══ -->
<div id="app" style="display:none;">

  <!-- 사이드바 -->
  <aside class="sidebar">
    <div class="sidebar-logo">세무 <span>AI</span></div>

    <div class="sidebar-section">
      <div class="sidebar-label">문서 업로드</div>

      <div class="dropzone" id="dropzone"
           ondragover="handleDragOver(event)"
           ondragleave="handleDragLeave(event)"
           ondrop="handleDrop(event)">
        <input type="file" accept=".pdf" multiple onchange="handleFileSelect(event)">
        <div class="dropzone-icon">📄</div>
        <div class="dropzone-text">PDF를 여기에 드래그하거나<br>클릭해서 선택하세요</div>
      </div>

      <div class="upload-status" id="upload-status"></div>
    </div>

    <div class="file-list" id="file-list"></div>

    <div class="sidebar-user">
      <div class="user-avatar" id="user-avatar">?</div>
      <div class="user-email"  id="user-email"></div>
      <button class="btn-logout" onclick="logout()">로그아웃</button>
    </div>
  </aside>

  <!-- 채팅 영역 -->
  <main class="chat-area">
    <header class="chat-header">
      <div class="status-dot"></div>
      <h1>세무 법령 RAG 어시스턴트</h1>
    </header>

    <div class="messages" id="messages">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">⚖️</div>
        <div class="empty-title">무엇이든 물어보세요</div>
        <div class="empty-sub">
          업로드한 세무 법령 문서를 기반으로<br>
          정확한 법적 근거와 함께 답변드립니다.
        </div>
      </div>
    </div>

    <div class="chat-input-wrap">
      <textarea
        class="chat-input"
        id="chat-input"
        placeholder="세무 관련 질문을 입력하세요…"
        rows="1"
        onkeydown="handleKeydown(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="btn-send" id="send-btn" onclick="sendMessage()" title="전송">
        ↑
      </button>
    </div>
  </main>
</div>

<script>
// ══ 상태 ══════════════════════════════════════════════════
const API = '';  // 같은 origin (FastAPI가 HTML 서빙), 외부면 'http://localhost:8000'
let token     = localStorage.getItem('tax_token')     || '';
let userEmail = localStorage.getItem('tax_email')     || '';
let userId    = localStorage.getItem('tax_user_id')   || '';
let currentTab = 'login';
const uploadedFiles = [];

// ══ 초기화 ════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  if (token) {
    showApp();
  }
  document.getElementById('auth-email').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('auth-pw').focus();
  });
  document.getElementById('auth-pw').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleAuth();
  });
});

// ══ 인증 ══════════════════════════════════════════════════
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.auth-tab').forEach((el, i) => {
    el.classList.toggle('active', (i === 0) === (tab === 'login'));
  });
  document.getElementById('auth-btn').textContent = tab === 'login' ? '로그인' : '회원가입';
  document.getElementById('auth-confirm-wrap').style.display = tab === 'signup' ? 'block' : 'none';
  setAuthMsg('');
}

function setAuthMsg(msg, type = '') {
  const el = document.getElementById('auth-msg');
  el.textContent = msg;
  el.className = 'auth-msg' + (type ? ' ' + type : '');
}

async function handleAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const pw    = document.getElementById('auth-pw').value;
  const btn   = document.getElementById('auth-btn');

  if (!email || !pw) { setAuthMsg('이메일과 비밀번호를 입력해주세요.', 'error'); return; }

  if (currentTab === 'signup') {
    const pw2 = document.getElementById('auth-pw2').value;
    if (pw !== pw2) { setAuthMsg('비밀번호가 일치하지 않습니다.', 'error'); return; }
  }

  btn.disabled = true;
  setAuthMsg(currentTab === 'login' ? '로그인 중…' : '가입 중…');

  try {
    if (currentTab === 'signup') {
      const r = await apiFetch('/api/auth/signup', 'POST', { email, password: pw });
      if (r.ok) {
        setAuthMsg('가입 완료! 로그인해주세요.', 'success');
        switchTab('login');
        document.getElementById('auth-email').value = email;
        document.getElementById('auth-pw').value = '';
        return;
      }
      const err = await r.json();
      setAuthMsg(err.detail || '가입에 실패했습니다.', 'error');
    } else {
      const r = await apiFetch('/api/auth/login', 'POST', { email, password: pw });
      if (r.ok) {
        const data = await r.json();
        token     = data.access_token;
        userEmail = data.user.email;
        userId    = data.user.id;
        localStorage.setItem('tax_token',   token);
        localStorage.setItem('tax_email',   userEmail);
        localStorage.setItem('tax_user_id', userId);
        showApp();
      } else {
        const err = await r.json();
        setAuthMsg(err.detail || '로그인에 실패했습니다.', 'error');
      }
    }
  } catch {
    setAuthMsg('서버에 연결할 수 없습니다.', 'error');
  } finally {
    btn.disabled = false;
  }
}

function showApp() {
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('app').style.display = 'flex';
  document.getElementById('user-email').textContent = userEmail;
  document.getElementById('user-avatar').textContent = (userEmail[0] || '?').toUpperCase();
  document.getElementById('chat-input').focus();
}

function logout() {
  token = userEmail = userId = '';
  localStorage.removeItem('tax_token');
  localStorage.removeItem('tax_email');
  localStorage.removeItem('tax_user_id');
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('app').style.display = 'none';
  document.getElementById('messages').innerHTML = `
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">⚖️</div>
      <div class="empty-title">무엇이든 물어보세요</div>
      <div class="empty-sub">업로드한 세무 법령 문서를 기반으로<br>정확한 법적 근거와 함께 답변드립니다.</div>
    </div>`;
  uploadedFiles.length = 0;
  document.getElementById('file-list').innerHTML = '';
}

// ══ API 헬퍼 ══════════════════════════════════════════════
function apiFetch(path, method = 'GET', body = null, isForm = false) {
  const headers = {};
  if (token) headers['Authorization'] = 'Bearer ' + token;
  if (!isForm && body) headers['Content-Type'] = 'application/json';

  return fetch(API + path, {
    method,
    headers,
    body: body ? (isForm ? body : JSON.stringify(body)) : undefined,
  });
}

// ══ 파일 업로드 ══════════════════════════════════════════
function handleDragOver(e)  { e.preventDefault(); document.getElementById('dropzone').classList.add('dragover'); }
function handleDragLeave()  { document.getElementById('dropzone').classList.remove('dragover'); }
function handleDrop(e)      { e.preventDefault(); handleDragLeave(); uploadFiles(e.dataTransfer.files); }
function handleFileSelect(e){ uploadFiles(e.target.files); e.target.value = ''; }

async function uploadFiles(files) {
  for (const file of files) {
    if (!file.name.toLowerCase().endsWith('.pdf')) {
      setUploadStatus('PDF 파일만 가능합니다.', 'err'); continue;
    }
    setUploadStatus(`${file.name} 업로드 중…`);
    const form = new FormData();
    form.append('file', file);
    try {
      const r    = await apiFetch('/api/upload', 'POST', form, true);
      const data = await r.json();
      if (r.ok) {
        setUploadStatus(`✓ ${file.name} (${data.chunks_stored}청크)`, 'ok');
        addFileItem(file.name, data.law_name);
      } else {
        setUploadStatus(data.detail || '업로드 실패', 'err');
      }
    } catch {
      setUploadStatus('업로드 오류', 'err');
    }
  }
}

function setUploadStatus(msg, cls = '') {
  const el = document.getElementById('upload-status');
  el.textContent = msg;
  el.className   = 'upload-status' + (cls ? ' ' + cls : '');
}

function addFileItem(name, lawName) {
  const list = document.getElementById('file-list');
  const item = document.createElement('div');
  item.className = 'file-item';
  item.innerHTML = `<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${name}</span>
    <span class="badge">${lawName || '공통'}</span>`;
  list.appendChild(item);
}

// ══ 채팅 ══════════════════════════════════════════════════
function handleKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}

async function sendMessage() {
  const input  = document.getElementById('chat-input');
  const query  = input.value.trim();
  if (!query) return;

  // 빈 상태 제거
  document.getElementById('empty-state')?.remove();

  addMessage('user', query);
  input.value = '';
  input.style.height = 'auto';

  const typingEl = addTypingIndicator();
  document.getElementById('send-btn').disabled = true;

  try {
    const r = await apiFetch('/api/chat', 'POST', { query, userId });
    const data = await r.json();
    typingEl.remove();
    if (r.ok) {
      addMessage('assistant', data.output);
    } else {
      if (r.status === 401) logout();
      addMessage('assistant', `⚠️ ${data.detail || '오류가 발생했습니다.'}`);
    }
  } catch {
    typingEl.remove();
    addMessage('assistant', '⚠️ 서버에 연결할 수 없습니다.');
  } finally {
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }
}

function addMessage(role, content) {
  const msgs    = document.getElementById('messages');
  const isUser  = role === 'user';
  const wrapper = document.createElement('div');
  wrapper.className = `msg ${role}`;

  const html = isUser
    ? content.replace(/</g, '&lt;')
    : marked.parse(content);

  wrapper.innerHTML = `
    <div class="msg-avatar">${isUser ? (userEmail[0]||'U').toUpperCase() : '⚖'}</div>
    <div class="msg-bubble">${html}</div>`;
  msgs.appendChild(wrapper);
  msgs.scrollTop = msgs.scrollHeight;
  return wrapper;
}

function addTypingIndicator() {
  const msgs    = document.getElementById('messages');
  const wrapper = document.createElement('div');
  wrapper.className = 'msg assistant';
  wrapper.innerHTML = `
    <div class="msg-avatar">⚖</div>
    <div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(wrapper);
  msgs.scrollTop = msgs.scrollHeight;
  return wrapper;
}
</script>
